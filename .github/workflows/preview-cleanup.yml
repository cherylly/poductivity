name: PR Preview Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Tear down preview environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            PREVIEW_DIR="/opt/content-digest-preview"
            cd "$PREVIEW_DIR" 2>/dev/null && \
              docker compose -p content-digest-preview -f docker-compose.preview.yml down --rmi local || true
            rm -rf "$PREVIEW_DIR"

      - name: Comment cleanup notice on PR
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c => c.body.includes('Preview deployed!'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: `🔍 **Preview cleaned up.**\n\n_PR ${context.payload.pull_request.merged ? 'merged' : 'closed'}, preview environment removed._`,
              });
            }
