name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Package and upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "."
          target: /opt/content-digest-preview
          overwrite: true

      - name: Build and start preview
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /opt/content-digest-preview

            mkdir -p data
            cp /opt/content-digest/data/content_digest.db data/content_digest.db 2>/dev/null || true
            cp /opt/content-digest/.env .env 2>/dev/null || true

            docker compose -p content-digest-preview -f docker-compose.preview.yml up -d --build

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `**Preview deployed!**\n\nPreview URL: http://${{ secrets.SERVER_HOST }}:8081\n\n_Auto-deployed from commit ${context.sha.substring(0, 7)}_`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c => c.body.includes('Preview deployed!'));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
